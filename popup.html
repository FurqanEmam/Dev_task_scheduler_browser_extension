<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevTask</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="logo-mark">▸</span>
        <span class="logo-text">DevTask</span>
      </div>
      <div class="header-right">
        <div class="stats-pill" id="stats-pill">
          <span id="stats-done">0</span>/<span id="stats-total">0</span>
        </div>
        <button class="icon-btn" id="filter-btn" title="Filter">⊟</button>
        <button class="icon-btn" id="add-btn" title="Add task (Alt+N)">＋</button>
      </div>
    </header>

    <!-- Filter Bar -->
    <div class="filter-bar" id="filter-bar" style="display:none">
      <div class="filter-row">
        <span class="filter-label">Category</span>
        <div class="chip-group" id="cat-filter">
          <button class="chip active" data-val="all">All</button>
          <button class="chip" data-val="work">Work</button>
          <button class="chip" data-val="study">Study</button>
          <button class="chip" data-val="uni">Uni</button>
          <button class="chip" data-val="side">Side</button>
        </div>
      </div>
      <div class="filter-row">
        <span class="filter-label">Priority</span>
        <div class="chip-group" id="pri-filter">
          <button class="chip active" data-val="all">All</button>
          <button class="chip chip-p1" data-val="p1">P1</button>
          <button class="chip chip-p2" data-val="p2">P2</button>
          <button class="chip chip-p3" data-val="p3">P3</button>
        </div>
      </div>
      <div class="filter-row">
        <span class="filter-label">Status</span>
        <div class="chip-group" id="status-filter">
          <button class="chip active" data-val="all">All</button>
          <button class="chip" data-val="todo">Todo</button>
          <button class="chip" data-val="inprogress">In Progress</button>
          <button class="chip" data-val="done">Done</button>
        </div>
      </div>
    </div>

    <!-- Task List -->
    <main class="task-list" id="task-list">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">◈</div>
        <p>No tasks yet.<br/>Press <kbd>Alt+N</kbd> or tap ＋</p>
      </div>
    </main>

    <!-- Add / Edit Modal -->
    <div class="modal-overlay" id="modal-overlay" style="display:none">
      <div class="modal" id="modal">
        <div class="modal-header">
          <span class="modal-title" id="modal-title">New Task</span>
          <button class="icon-btn" id="modal-close">✕</button>
        </div>

        <div class="form-group">
          <input class="form-input" id="f-title" type="text" placeholder="Task title…" maxlength="120" autocomplete="off" />
        </div>

        <div class="form-row">
          <div class="form-group half">
            <label class="form-label">Category</label>
            <select class="form-select" id="f-category">
              <option value="work">💼 Work</option>
              <option value="study">📖 Study</option>
              <option value="uni">🎓 Uni</option>
              <option value="side">🚀 Side</option>
            </select>
          </div>
          <div class="form-group half">
            <label class="form-label">Priority</label>
            <select class="form-select" id="f-priority">
              <option value="p1">🔴 P1 — Critical</option>
              <option value="p2">🟡 P2 — Normal</option>
              <option value="p3">🔵 P3 — Low</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group half">
            <label class="form-label">Status</label>
            <select class="form-select" id="f-status">
              <option value="todo">⬜ Todo</option>
              <option value="inprogress">🔄 In Progress</option>
              <option value="done">✅ Done</option>
            </select>
          </div>
          <div class="form-group half">
            <label class="form-label">Due date</label>
            <input class="form-input" id="f-due" type="date" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea class="form-textarea" id="f-notes" placeholder="Notes, links, sub-tasks…" rows="3"></textarea>
        </div>

        <div class="modal-actions">
          <button class="btn-secondary" id="modal-cancel">Cancel</button>
          <button class="btn-primary" id="modal-save">Save Task</button>
        </div>
      </div>
    </div>

    <!-- Task Detail Drawer -->
    <div class="drawer-overlay" id="drawer-overlay" style="display:none">
      <div class="drawer" id="drawer">
        <div class="drawer-header">
          <span class="drawer-cat-badge" id="d-cat-badge"></span>
          <button class="icon-btn" id="drawer-close">✕</button>
        </div>
        <h2 class="drawer-title" id="d-title"></h2>
        <div class="drawer-meta" id="d-meta"></div>
        <div class="drawer-notes" id="d-notes"></div>
        <div class="drawer-actions">
          <button class="btn-secondary" id="d-edit-btn">Edit</button>
          <button class="btn-danger" id="d-delete-btn">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
